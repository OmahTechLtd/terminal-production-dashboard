name: Streamlit Keep Alive Heartbeat

on:
  schedule:
    - cron: '0 */10 * * *' # Runs automatically every 10 hours
  workflow_dispatch: # Allows you to trigger it manually if needed

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make Empty Commit
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git commit --allow-empty -m "Heartbeat to reset Streamlit sleep timer"
          git push
